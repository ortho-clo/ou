<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>L'évasion de Léo - Version Expert Plus (Évidence)</title>
    <style>
        /* Règle stricte Century Gothic partout, pas de majuscules automatiques */
        * { box-sizing: border-box; font-family: 'Century Gothic', sans-serif; user-select: none; text-transform: none; }
        body { margin: 0; padding: 0; background-color: #1a237e; color: #ffffff; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; }

        #game-container {
            width: 100%; max-width: 950px; height: 100%; max-height: 850px;
            background: linear-gradient(135deg, #4fc3f7, #0288d1);
            position: relative; box-shadow: 0 10px 40px rgba(0,0,0,0.6);
            border-radius: 20px; overflow: hidden; display: flex; flex-direction: column;
        }

        .screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            padding: 20px; display: none; flex-direction: column; align-items: center;
            justify-content: center; text-align: center; overflow-y: auto;
        }

        .active { display: flex; animation: slideIn 0.5s cubic-bezier(0.25, 0.8, 0.25, 1) forwards; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-10px); } 75% { transform: translateX(10px); } }

        /* Animation Feu d'artifice */
        @keyframes firework {
            0% { transform: translate(-50%, 0) scale(1); opacity: 1; }
            100% { transform: translate(-50%, -150px) scale(0.1); opacity: 0; }
        }
        .particle { position: absolute; font-size: 2rem; animation: firework 1s ease-out forwards; pointer-events: none; z-index: 100; }

        /* Style pour l'évidence sur les sons vedettes */
        .highlight {
            color: #ff5252; /* Rouge vif pour l'évidence */
            font-weight: bold;
        }

        h1 { font-size: 2rem; margin-bottom: 15px; color: #fff3e0; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); }
        p { font-size: 1.25rem; line-height: 1.4; margin-bottom: 15px; }

        .story-box {
            background: rgba(255, 255, 255, 0.95); color: #1a237e; padding: 25px;
            border-radius: 15px; font-size: 1.35rem; text-align: left;
            margin-bottom: 20px; width: 95%; max-height: 350px; overflow-y: auto;
            border-left: 8px solid #ffb300; box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .btn {
            background-color: #ffb300; color: #3e2723; border: none; padding: 12px 28px;
            font-size: 1.2rem; font-weight: bold; border-radius: 50px; cursor: pointer;
            box-shadow: 0 5px 0 #ff8f00; transition: all 0.1s; margin: 8px;
        }
        .btn:active { transform: translateY(4px); box-shadow: 0 0 0 #ff8f00; }
        .btn-option { background-color: #ffffff; color: #0288d1; width: 85%; max-width: 550px; }

        input[type="text"] {
            padding: 15px; font-size: 1.5rem; border-radius: 10px; border: 4px solid #ffb300;
            text-align: center; width: 80%; margin-bottom: 15px; color: #1a237e; font-weight: bold;
        }

        /* Grille des missions colorée et agrandie */
        .grid-menu { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; width: 95%; max-width: 800px;}
        .cours-btn { 
            color: #fff; text-shadow: 1px 1px 2px rgba(0,0,0,0.5); 
            font-size: 1.2rem; padding: 25px; border-radius: 20px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 160px; /* Plus grand */
        }
        /* Couleurs spécifiques par mission */
        .cours-1 { background-color: #81c784; box-shadow: 0 6px 0 #388e3c; } /* p/b Vert */
        .cours-2 { background-color: #e57373; box-shadow: 0 6px 0 #d32f2f; } /* f/v Rouge */
        .cours-3 { background-color: #ffb74d; box-shadow: 0 6px 0 #f57c00; } /* t/d Orange */
        .cours-4 { background-color: #ba68c8; box-shadow: 0 6px 0 #7b1fa2; } /* ch/j Violet */
        .cours-5 { background-color: #4fc3f7; box-shadow: 0 6px 0 #0288d1; } /* s/z Bleu */
        .cours-6 { background-color: #d4e157; box-shadow: 0 6px 0 #afb42b; color: #333; } /* c/g Jaune-Vert */

        .cours-btn:active { transform: translateY(6px); box-shadow: none; }
        
        #hud { width: 100%; display: flex; justify-content: space-between; padding: 12px 25px; background: rgba(0,0,0,0.3); font-weight: bold; font-size: 1.1rem;}
        .progress-container { width: 90%; height: 14px; background: rgba(255,255,255,0.3); border-radius: 10px; margin: 15px auto; overflow: hidden; flex-shrink: 0;}
        .progress-bar { height: 100%; width: 0%; background: #ffeb3b; transition: width 0.3s; }
        
        .tts-btn { background: #e1bee7; border-radius: 50%; width: 70px; height: 70px; font-size: 2.5rem; line-height: 70px; cursor: pointer; box-shadow: 0 4px 0 #ab47bc; margin-bottom: 10px; display: inline-block;}
        .tts-btn:active { transform: translateY(4px); box-shadow: none; }
    </style>
</head>

    </div>

        <div class="grid-menu" id="cours-grid"></div>

            <span id="cours-title">Mission</span>
        </div>
        <div class="progress-container"><div class="progress-bar" id="progress"></div></div>

            <div id="write-image-container" style="display:none; font-size: 5rem; margin-bottom: 10px;"></div>

        </div>
    </div>

    <div id="screen-end" class="screen">
        <div style="font-size:6rem; margin-bottom: 20px;">🏆</div>

        <p>Tu es un véritable détective des sons.</p>

    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playSound(f1, f2, dur, type='sine') {
        if(audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
        osc.type = type; osc.connect(gain); gain.connect(audioCtx.destination);
        osc.frequency.setValueAtTime(f1, audioCtx.currentTime);osc.frequency.exponentialRampToValueAtTime(f2, audioCtx.currentTime + dur);
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime); gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + dur);
        osc.start(); osc.stop(audioCtx.currentTime + dur);
    }
    function speak(txt) { speechSynthesis.cancel(); const u = new SpeechSynthesisUtterance(txt); u.lang = 'fr-CA'; u.rate = 0.8; speechSynthesis.speak(u); }

        for (let i = 0; i < 30; i++) {
            const p = document.createElement('span');
            p.className = 'particle';
            p.innerText = emojis[Math.floor(Math.random() * emojis.length)];
            p.style.left = `calc(50% + ${Math.random() * 200 - 100}px)`;
            p.style.top = `calc(50% + ${Math.random() * 100 - 50}px)`;
            p.style.animationDelay = `${Math.random() * 0.5}s`;
            p.style.color = `hsl(${Math.random() * 360}, 100%, 70%)`;
            container.appendChild(p);
            setTimeout(() => p.remove(), 1500);
        }
        playSound(400, 1000, 0.5, 'triangle');
    }

        "6|st|Caroline joue de la guitare acoustique dans sa grande cuisine grise. Elle porte une bague dorée qui brille comme un glaçon au soleil. Son chat gris écoute la musique country en ronronnant. Caroline regarde le grand ciel gris et continue de gratter sa guitare.|||",
        "6|cq|De quel instrument joue Caroline ?||De la guitare|Du clavier",
        "6|st|Le kangourou court avec un sac rempli de carottes croquantes. Il veut les donner au guépard gourmand qui a très faim au zoo. C'est un cadeau très gentil pour son grand ami de la cage voisine. Le guépard court plus vite que le vent grâce à ce grand cadeau.|||",
        "6|cq|Que contient le sac du kangourou ?||Des carottes|Un gâteau"
    ];

    let db = {};
    rawData.forEach(r => { 
        const p = r.split('|'); 
        if(!db[p[0]]) db[p[0]] = []; 
        db[p[0]].push({type:p[1], img:p[2], q:p[2], w:p[3], a:p[4], b:p[5]}); 
    });

    const config = [
        {id:1, t:"p / b", e:"⛵", c:"cours-1"}, {id:2, t:"f / v", e:"🚐", c:"cours-2"}, {id:3, t:"t / d", e:"🦖", c:"cours-3"},
        {id:4, t:"ch / j", e:"🐈", c:"cours-4"}, {id:5, t:"s / z", e:"🦓", c:"cours-5"}, {id:6, t:"c,k / g,gu", e:"🎸", c:"cours-6"}
    ];

    // Progression libre : unlocked = 6
    let currentId = 1, qIdx = 0, stars = 0, unlocked = 6, curWord = "", curAns = "";

    function switchScreen(id) {
        playSound(300, 600, 0.2);
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(id === 'screen-map') buildMap();
    }

    function buildMap() {
        const g = document.getElementById('cours-grid'); g.innerHTML = '';
        config.forEach(c => {
            const b = document.createElement('button');
            b.className = `btn cours-btn ${c.c}`; // Toujours ouvert, classe couleur appliquée
            b.innerHTML = `<span style="font-size:2.5rem; margin-bottom:5px;">${c.e}</span>Mission ${c.id}<br>${c.t}`;
            b.onclick = () => start(c.id);
            g.appendChild(b);
        });
    }

    function start(id) {
        currentId = id; qIdx = 0;
        document.getElementById('cours-title').innerText = `Mission ${id}`;
        switchScreen('screen-game');
        load();
    }

    function load() {
        speechSynthesis.cancel(); // Arrête TTS si en cours
        const questions = db[currentId];
        if(qIdx >= questions.length) { end(); return; }
        
        const q = questions[qIdx];
        document.getElementById('progress').style.width = `${(qIdx/questions.length)*100}%`;
        
        // Cache tout par défaut
        const zones = ['tts-zone', 'options-zone', 'write-zone', 'story-zone', 'write-image-container', 'story-next-btn'];
        zones.forEach(z => document.getElementById(z).style.display = 'none');
        document.getElementById('question-text').innerHTML = ""; // Clear
        
        // Configuration selon le type
        if(q.type === 'ph' || q.type === 'wr') {
            document.getElementById('tts-zone').style.display = 'block';
            curWord = q.w;
            // Auto-play seulement phono (ph). Pour l'écriture (wr), on parle à l'ouverture.
            if(q.type === 'ph') speak(q.w); 
        }

        if(q.type === 'ph' || q.type === 'tx' || q.type === 'vi') {
            document.getElementById('options-zone').style.display = 'flex';
            // évidence sur q.q si type tx ou vi
            document.getElementById('question-text').innerHTML = (q.type === 'ph' ? q.q : highlightText(q.q));
            renderOptions(q);
        } else if(q.type === 'wr') {
            document.getElementById('write-image-container').style.display = 'block';
            document.getElementById('write-image-container').innerText = q.img; // Affiche emoji
            document.getElementById('write-zone').style.display = 'flex';
            document.getElementById('write-input').value = "";
            document.getElementById('question-text').innerHTML = "Écris le mot cible :";
            curAns = q.a;
            speak(q.w); // Parle à l'ouverture de la dictée
        } else if(q.type === 'st') {
            document.getElementById('story-zone').style.display = 'flex';
            // évidence sur l'histoire (q.q)
            document.getElementById('story-display').innerHTML = highlightText(q.q); 
            document.getElementById('question-text').innerHTML = "Lecture attentive...";
            document.getElementById('story-next-btn').style.display = 'inline-block';
        } else if(q.type === 'cq') {
            // Reste visible pendant la question !
            document.getElementById('story-zone').style.display = 'flex'; 
            // évidence sur la question (q.q)
            document.getElementById('question-text').innerHTML = highlightText(q.q); 
            document.getElementById('options-zone').style.display = 'flex';
            renderOptions(q);
        }
        
        const icons = {ph:"👂", tx:"📝", vi:"🌪️", wr:"✍️", st:"📖", cq:"🧐"};
        document.getElementById('q-header').innerText = icons[q.type] || "🧩";
    }

    function renderOptions(q) {
        const z = document.getElementById('options-zone'); z.innerHTML = '';
        let opts = [q.a, q.b];
        // Mélange sauf virelangue
        if(q.type !== 'vi') opts.sort(() => Math.random() - 0.5);
        opts.forEach(o => {
            const b = document.createElement('button');
            b.className = 'btn btn-option'; 
            // évidence sur les choix textuels (tx, cq), pas sur phono (p,b) ou vi (boutons standard)
            if(q.type === 'tx' || q.type === 'cq') {
                b.innerHTML = highlightText(o); 
            } else {
                b.innerText = o;
            }
            b.onclick = () => check(o, q.a, b);
            z.appendChild(b);
        });
    }

    function check(sel, cor, b) {
        if(sel === cor) {
            playSound(600, 900, 0.3, 'triangle'); stars++; updateScore();
            b.style.background = "#81c784";b.style.color = "white";
            setTimeout(nextStep, 600);
        } else {
            playSound(200, 100, 0.3, 'sawtooth');
            b.style.background = "#e57373";b.style.color = "white";
            document.getElementById('game-content').style.animation = 'shake 0.4s';
            setTimeout(() => { b.style.background = "#fff"; b.style.color="#0288d1"; document.getElementById('game-content').style.animation = ''; }, 400);
        }
    }

    function checkWritten() {
        const input = document.getElementById('write-input');
        const val = input.value.trim().toLowerCase();
        if(val === curAns.toLowerCase()) {
            playSound(600, 900, 0.3, 'triangle'); stars++; updateScore();
            input.style.background = "#81c784"; input.style.color = "white";
            setTimeout(() => { input.style.background = "#fff"; input.style.color="#1a237e"; nextStep(); }, 600);
        } else {
            playSound(200, 100, 0.3, 'sawtooth');
            input.style.background = "#e57373"; input.style.color = "white";
            document.getElementById('game-content').style.animation = 'shake 0.4s';
            setTimeout(() => { input.style.background = "#fff"; input.style.color="#1a237e"; document.getElementById('game-content').style.animation = ''; }, 400);
        }
    }

    function nextStep() { qIdx++; load(); }
    function playTTS() { playSound(400,400,0.1); speak(curWord); }
    function updateScore() { document.getElementById('score-display').innerText = `Étoiles : ${stars} ⭐️`; }
    
    function end() {
        document.getElementById('end-title').innerText = `Mission ${currentId} réussie !`;
        triggerFireworks(); // Feu d'artifice visuel et sonore explosion
        switchScreen('screen-end');
    }

    // Initialisation
    buildMap();
</script>
</body>
</html>

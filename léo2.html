<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Le grand chantier de Léo - Mission 2</title>
    <style>
        /* Police stricte et reset */
        * {
            box-sizing: border-box;
            font-family: 'Century Gothic', sans-serif;
            margin: 0;
            padding: 0;
            user-select: none;
            touch-action: none;
        }

        body {
            background-color: #87ceeb;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        #app-container {
            background-color: #fcfcfc;
            width: 100%;
            max-width: 900px;
            height: 100vh;
            max-height: 650px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .screen {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            width: 100%;
            padding: 10px;
            animation: fadeIn 0.4s ease-in-out;
            text-align: center;
        }

        .screen.active { display: flex; }

        /* Animations */
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }
        @keyframes pop { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        @keyframes pulseQuestion { 0%, 100% { transform: scale(1); box-shadow: 0 0 0 rgba(231, 76, 60, 0); } 50% { transform: scale(1.1); box-shadow: 0 0 20px rgba(231, 76, 60, 0.6); } }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
        @keyframes floatUp { 0% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-50px); } }

        /* Titres multicolores partout */
        .titre-colore {
            font-size: 2.2rem;
            font-weight: bold;
            margin-bottom: 15px;
            background: linear-gradient(90deg, #ff4757, #ffa502, #2ed573, #1e90ff);
            -webkit-background-clip: text;
            color: transparent;
            line-height: 1.3;
        }

        .texte-normal {
            font-size: 1.2rem;
            margin-bottom: 15px;
            padding: 0 20px;
        }

        /* ----- LÉO ----- */
        .castor-container {
            position: relative;
            display: inline-block;
            font-size: 3.5rem;
            animation: pop 3s infinite;
            margin-bottom: 15px;
            z-index: 10;
        }
        .chapeau-construction {
            position: absolute; top: -5px; left: 50%; transform: translateX(-50%); width: 28px; height: 16px; background-color: #f1c40f; border-radius: 20px 20px 0 0; border: 2px solid #d35400; border-bottom: none; z-index: 11;
        }
        .chapeau-construction::after {
            content: ''; position: absolute; bottom: 0; left: -4px; width: 32px; height: 4px; background-color: #f1c40f; border-radius: 2px; border: 2px solid #d35400;
        }
        .castor-emoji { display: inline-block; transform: scaleX(-1); }

        /* ----- LA RUE ET LE BLOC MYSTÈRE ----- */
        .quartier { display: flex; flex-direction: column; width: 100%; align-items: center; margin-bottom: 20px; }
        .rue-objets { display: flex; align-items: flex-end; justify-content: center; gap: 30px; width: 100%; padding: 0 10px; }
        .asphalte { width: 100%; height: 30px; background-color: #576574; position: relative; z-index: 1; }
        .ligne-jaune { position: absolute; top: 50%; width: 100%; height: 4px; border-top: 5px dashed #f1c40f; }

        .bloc-colle { display: flex; align-items: flex-end; gap: 0; position: relative; z-index: 2; }
        .lampadaire { display: flex; flex-direction: column; align-items: center; z-index: 2; margin-right: -2px; }
        .lumiere { font-size: 2rem; text-shadow: 0 0 15px #f1c40f; margin-bottom: -5px; z-index: 3; position: relative; }
        .poteau-lampe { width: 6px; height: 40px; background-color: #34495e; border-radius: 3px; z-index: 2; }

        .stop-panneau { position: relative; width: 25px; height: 35px; margin-left: 2px; z-index: 5; }
        .stop-icone { font-size: 1.1rem; position: absolute; bottom: -2px; left: 50%; transform: translateX(-50%); z-index: 6; }
        .stop-poteau { position: absolute; bottom: -30px; left: 50%; transform: translateX(-50%); width: 4px; height: 45px; background-color: #34495e; border-radius: 2px; z-index: 4; }

        .maison-bloc { display: flex; flex-direction: column; align-items: center; position: relative; z-index: 2; }
        .toit { width: 0; height: 0; border-left: 20px solid transparent; border-right: 20px solid transparent; border-bottom: 20px solid #7f8c8d; margin-bottom: -1px; }
        .mur { display: flex; flex-direction: row; background-color: #f1c40f; border: 3px solid #7f8c8d; border-top: none; height: 35px; }
        .brique { width: 40px; height: 100%; border-right: 2px solid rgba(0,0,0,0.15); }
        .brique:last-child { border-right: none; }
        .toit.large-2 { border-left-width: 40px; border-right-width: 40px; }
        .toit.large-3 { border-left-width: 60px; border-right-width: 60px; }

        .voiture-absolute { position: absolute; right: -30px; width: 30px; bottom: -5px; font-size: 2rem; display: flex; justify-content: center; align-items: flex-end; z-index: 10; }

        /* Le bloc mystère en dessous de la rue */
        .bloc-mystere-container {
            margin-top: 15px;
            display: flex;
            justify-content: center;
        }
        .brique-mystere {
            width: 70px; height: 50px;
            background-color: #f1c40f;
            border: 3px solid #e74c3c;
            border-radius: 5px;
            display: flex; justify-content: center; align-items: center;
            font-size: 2rem; font-weight: bold; color: #e74c3c;
            animation: pulseQuestion 2s infinite;
        }

        /* ----- INTERFACE DU JEU ----- */
        .top-bar { position: absolute; top: 0; left: 0; right: 0; padding: 15px; display: flex; justify-content: space-between; background: #f1f2f6; border-bottom: 3px solid #dfe4ea; font-size: 1.2rem; font-weight: bold; }
        .progress-container { width: 40%; height: 20px; background-color: #ddd; border-radius: 10px; overflow: hidden; margin-top: 2px; }
        .progress-bar { height: 100%; width: 0%; background-color: #e74c3c; transition: width 0.3s; }
        .emoji-display { font-size: 5rem; margin: 5px 0; z-index: 10; }
        .dragging { position: fixed !important; z-index: 9999; pointer-events: none; }
        .point-flottant { position: absolute; top: -20px; font-size: 1.5rem; color: #e74c3c; font-weight: bold; animation: floatUp 1s ease-out forwards; pointer-events: none; }

        /* BOUTONS D'ACTION (Rouge Royal) */
        button { border: none; border-radius: 30px; font-weight: bold; cursor: pointer; transition: all 0.2s; }
        button:active { transform: translateY(4px); box-shadow: 0 0 0 transparent !important; }
        
        .btn-action { 
            background-color: #e74c3c; 
            color: white; 
            padding: 15px 30px; 
            font-size: 1.2rem; 
            box-shadow: 0 5px 0 #c0392b; 
            margin: 10px; 
        }
        .btn-audio { background-color: #e74c3c; box-shadow: 0 5px 0 #c0392b; color: white; font-size: 3rem; width: 80px; height: 80px; border-radius: 50%; display: flex; justify-content: center; align-items: center; margin: 10px auto; animation: pop 2s infinite; }
        
        .btn-menu { padding: 15px; width: 80%; max-width: 400px; display: flex; align-items: center; gap: 15px; font-size: 1.2rem; color: #2d3436; margin: 8px; border-radius: 15px; }
        .btn-niv-1 { background-color: #ffeaa7; border: 3px solid #fdcb6e; box-shadow: 0 5px 0 #fdcb6e; }
        .btn-niv-2 { background-color: #55efc4; border: 3px solid #00b894; box-shadow: 0 5px 0 #00b894; }
        .btn-niv-3 { background-color: #74b9ff; border: 3px solid #0984e3; box-shadow: 0 5px 0 #0984e3; }

        /* Zones et conteneurs pour les 3 jeux */
        .choix-container { display: flex; gap: 30px; margin-top: 15px; width: 100%; justify-content: center; align-items: center; height: 120px; }
        
        /* Boutons Oui/Non (Jeu 1) */
        .btn-oui { background-color: #2ecc71; color: white; font-size: 1.5rem; padding: 15px 40px; box-shadow: 0 5px 0 #27ae60; }
        .btn-non { background-color: #e74c3c; color: white; font-size: 1.5rem; padding: 15px 40px; box-shadow: 0 5px 0 #c0392b; }
        
        /* Boîtes Glisser (Jeu 2) */
        .boite-depot { width: 120px; height: 100px; border-radius: 15px; border: 4px dashed #bdc3c7; display: flex; flex-direction: column; justify-content: center; align-items: center; font-size: 1.2rem; font-weight: bold; background-color: #f1f2f6; }
        .boite-oui { border-color: #2ecc71; color: #27ae60; }
        .boite-non { border-color: #e74c3c; color: #c0392b; }

        /* Talkie-Walkie Interface (Jeu 3) */
        .talkie-interface { display: flex; gap: 20px; align-items: center; justify-content: center; width: 100%; margin-top: 10px; }
        .btn-talkie { background-color: #f1c40f; border: 4px solid #f39c12; color: #d35400; font-size: 1.5rem; padding: 20px 30px; border-radius: 15px; display: flex; flex-direction: column; align-items: center; box-shadow: 0 6px 0 #f39c12; width: 150px;}
        .btn-bruit { background-color: #95a5a6; border: 4px solid #7f8c8d; color: white; font-size: 1.2rem; padding: 20px 20px; border-radius: 15px; display: flex; flex-direction: column; align-items: center; box-shadow: 0 6px 0 #7f8c8d; width: 120px;}

        .badge-img { font-size: 8rem; margin: 10px; z-index: 2;}
        #feux-artifice { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; overflow: hidden; z-index: 100; }
    </style>
</head>
<body>

    <div id="app-container">

        <div id="ecran-intro" class="screen active">
            <p class="titre-colore">Juge de la présence d'une brique.</p>
            
            <div class="castor-container">
                <div class="chapeau-construction"></div>
                <span class="castor-emoji">🦫</span>
            </div>
            
            <div class="quartier">
                <div class="rue-objets">
                    <div class="bloc-colle">
                        <div class="lampadaire"><div class="lumiere">💡</div><div class="poteau-lampe"></div></div>
                        <div class="maison-bloc"><div class="toit"></div><div class="mur"><div class="brique"></div></div></div>
                    </div>
                    
                    <div class="maison-bloc">
                        <div class="toit"></div><div class="mur"><div class="brique"></div></div>
                        <div class="voiture-absolute">🚘</div>
                    </div>
                    
                    <div class="maison-bloc">
                        <div class="toit large-2"></div><div class="mur"><div class="brique"></div><div class="brique"></div></div>
                    </div>
                    
                    <div class="bloc-colle">
                        <div class="maison-bloc"><div class="toit large-3"></div><div class="mur"><div class="brique"></div><div class="brique"></div><div class="brique"></div></div></div>
                        <div class="stop-panneau"><div class="stop-poteau"></div><div class="stop-icone">🛑</div></div>
                    </div>
                </div>
                <div class="asphalte"><div class="ligne-jaune"></div></div>
                
                <div class="bloc-mystere-container">
                    <div class="brique-mystere" id="intro-mystere">❓</div>
                </div>
            </div>
            
            <p class="texte-normal">Léo cherche une syllabe cachée. Ouvre tes oreilles !</p>
            <button class="btn-action" onclick="jouerClic(); changerEcran('ecran-menu')">jouer</button>
        </div>

        <div id="ecran-menu" class="screen">
            <p class="titre-colore" style="font-size: 1.8rem;">Choisis ta mission.</p>
            
            <button class="btn-menu btn-niv-1" onclick="jouerClic(); demarrerJeu(1)"><span>👆</span> 1. clique oui ou non</button>
            <button class="btn-menu btn-niv-2" onclick="jouerClic(); demarrerJeu(2)"><span>🖐️</span> 2. glisse dans la boîte</button>
            <button class="btn-menu btn-niv-3" onclick="jouerClic(); demarrerJeu(3)"><span>📻</span> 3. utilise la radio</button>
            
            <button class="btn-action" onclick="jouerClic(); changerEcran('ecran-intro')">retour</button>
        </div>

        <div id="ecran-jeu" class="screen">
            <div class="top-bar">
                <span>🌟 <span id="score-affichage">0</span></span>
                <div class="progress-container"><div class="progress-bar" id="barre-progression"></div></div>
                <span id="titre-mission">mission</span>
            </div>
            
            <p class="titre-colore" id="consigne-jeu" style="margin-top: 40px; font-size: 1.6rem;">Écoute bien !</p>
            
            <div class="bloc-mystere-container" style="margin-top: -10px; margin-bottom: 10px;">
                <div class="brique-mystere" id="jeu-mystere">❓</div>
            </div>

            <button class="btn-audio" onclick="lireMotActuel()">🔊</button>
            <div class="emoji-display" id="mot-visuel">❓</div>
            
            <div class="choix-container" id="conteneur-clic" style="display:none;">
                <button class="btn-oui" onclick="verifierReponse(true, this)">oui</button>
                <button class="btn-non" onclick="verifierReponse(false, this)">non</button>
            </div>

            <div class="choix-container" id="conteneur-glisser" style="display:none;">
                <div class="boite-depot boite-oui cible-depot" data-reponse="true">✅<br>dedans</div>
                <div style="width: 50px;"></div> <div class="boite-depot boite-non cible-depot" data-reponse="false">❌<br>pas là</div>
            </div>

            <div class="talkie-interface" id="conteneur-talkie" style="display:none;">
                <button class="btn-talkie" onclick="jouerSonTalkie(); verifierReponse(true, this)"><span>📻</span>reçu !</button>
                <button class="btn-bruit" onclick="jouerClic(); verifierReponse(false, this)"><span>〰️</span>rien</button>
            </div>
        </div>

        <div id="ecran-victoire" class="screen">
            <div id="feux-artifice"></div>
            <p class="titre-colore" style="font-size: 2.5rem; z-index: 2;">Mission accomplie !</p>
            
            <div class="badge-img">📻</div>
            <p class="texte-normal" style="z-index: 2;">Tu as réussi ta mission et gagné ton talkie-walkie !</p>
            
            <button class="btn-action" style="z-index: 2;" onclick="jouerClic(); changerEcran('ecran-menu')">retour aux missions</button>
        </div>

    </div>

    <script>
        // Audio
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        function jouerSon(type) {
            if(audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            if (type === 'succes') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(600, audioCtx.currentTime); osc.frequency.setValueAtTime(800, audioCtx.currentTime + 0.1); gain.gain.setValueAtTime(0.1, audioCtx.currentTime); osc.start(); osc.stop(audioCtx.currentTime + 0.3);
            } else if (type === 'erreur') {
                osc.type = 'sawtooth'; osc.frequency.setValueAtTime(150, audioCtx.currentTime); gain.gain.setValueAtTime(0.1, audioCtx.currentTime); osc.start(); osc.stop(audioCtx.currentTime + 0.3);
            } else if (type === 'brique') {
                osc.type = 'triangle'; osc.frequency.setValueAtTime(350, audioCtx.currentTime); gain.gain.setValueAtTime(0.1, audioCtx.currentTime); osc.start(); osc.stop(audioCtx.currentTime + 0.1);
            }
        }

        function jouerClic() {
            if(audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination); osc.type = 'triangle'; osc.frequency.setValueAtTime(450, audioCtx.currentTime); gain.gain.setValueAtTime(0.1, audioCtx.currentTime); osc.start(); osc.stop(audioCtx.currentTime + 0.1);
        }

        function jouerSonTalkie() {
            if(audioCtx.state === 'suspended') audioCtx.resume();
            const osc1 = audioCtx.createOscillator(); const gain1 = audioCtx.createGain();
            osc1.connect(gain1); gain1.connect(audioCtx.destination); osc1.type = 'square';
            osc1.frequency.setValueAtTime(1200, audioCtx.currentTime); gain1.gain.setValueAtTime(0.05, audioCtx.currentTime);
            osc1.start(); osc1.stop(audioCtx.currentTime + 0.05);
            
            setTimeout(() => {
                const osc2 = audioCtx.createOscillator(); const gain2 = audioCtx.createGain();
                osc2.connect(gain2); gain2.connect(audioCtx.destination); osc2.type = 'square';
                osc2.frequency.setValueAtTime(1200, audioCtx.currentTime); gain2.gain.setValueAtTime(0.05, audioCtx.currentTime);
                osc2.start(); osc2.stop(audioCtx.currentTime + 0.05);
            }, 100);
        }

        function jouerVictoire() {
            if(audioCtx.state === 'suspended') audioCtx.resume();
            const notes = [523.25, 659.25, 783.99, 1046.50];
            notes.forEach((freq, i) => {
                setTimeout(() => {
                    const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
                    osc.connect(gain); gain.connect(audioCtx.destination); osc.type = 'sine'; osc.frequency.setValueAtTime(freq, audioCtx.currentTime); gain.gain.setValueAtTime(0.1, audioCtx.currentTime); osc.start(); osc.stop(audioCtx.currentTime + 0.2);
                }, i * 150);
            });
        }

        function parler(texte) {
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(texte);
            utterance.lang = 'fr-CA'; utterance.rate = 0.85; window.speechSynthesis.speak(utterance);
        }

        function lancerFeuxDartifice() {
            const conteneur = document.getElementById('feux-artifice'); conteneur.innerHTML = '';
            const particules = ['✨', '🌟', '🎉', '📻'];
            for(let i=0; i<40; i++) {
                let div = document.createElement('div'); div.innerText = particules[Math.floor(Math.random() * particules.length)]; div.style.position = 'absolute'; div.style.left = '50%'; div.style.top = '50%'; div.style.fontSize = (Math.random() * 2 + 1) + 'rem'; div.style.transition = 'all 1.5s cubic-bezier(0.1, 0.8, 0.3, 1)'; conteneur.appendChild(div);
                setTimeout(() => { let angle = Math.random() * Math.PI * 2; let distance = Math.random() * 250 + 50; div.style.transform = `translate(${Math.cos(angle)*distance}px, ${Math.sin(angle)*distance}px) scale(0)`; div.style.opacity = '0'; }, 50);
            }
        }

        // --- LISTES DE MOTS (Séquences mélangées, vraies syllabes) ---
        
        // Liste 1 : Vrai, Vrai, Faux, Vrai, Faux, Faux, Vrai, Faux
        const motsJeu1 = [
            { petitMot: 'chat', iconePetit: '🐱', mot: 'château', icone: '🏰', present: true },
            { petitMot: 'pot', iconePetit: '🍯', mot: 'poteau', icone: '💈', present: true },
            { petitMot: 'rat', iconePetit: '🐀', mot: 'mouton', icone: '🐑', present: false },
            { petitMot: 'riz', iconePetit: '🍚', mot: 'cerise', icone: '🍒', present: true },
            { petitMot: 'chat', iconePetit: '🐱', mot: 'bateau', icone: '⛵', present: false },
            { petitMot: 'riz', iconePetit: '🍚', mot: 'nuage', icone: '☁️', present: false },
            { petitMot: 'rat', iconePetit: '🐀', mot: 'râteau', icone: '🍂', present: true },
            { petitMot: 'pot', iconePetit: '🍯', mot: 'soleil', icone: '☀️', present: false }
        ];

        // Liste 2 : Faux, Vrai, Vrai, Faux, Faux, Vrai, Faux, Vrai
        const motsJeu2 = [
            { petitMot: 'loup', iconePetit: '🐺', mot: 'gâteau', icone: '🎂', present: false },
            { petitMot: 'scie', iconePetit: '🪚', mot: 'citron', icone: '🍋', present: true },
            { petitMot: 'mou', iconePetit: '☁️', mot: 'mouton', icone: '🐑', present: true },
            { petitMot: 'fée', iconePetit: '🧚', mot: 'livre', icone: '📖', present: false },
            { petitMot: 'scie', iconePetit: '🪚', mot: 'poubelle', icone: '🗑️', present: false },
            { petitMot: 'loup', iconePetit: '🐺', mot: 'chaloupe', icone: '🚤', present: true },
            { petitMot: 'mou', iconePetit: '☁️', mot: 'vélo', icone: '🚲', present: false },
            { petitMot: 'fée', iconePetit: '🧚', mot: 'café', icone: '☕', present: true }
        ];

        // Liste 3 : Faux, Vrai, Vrai, Faux, Vrai, Faux, Vrai, Faux
        const motsJeu3 = [
            { petitMot: 'bas', iconePetit: '🧦', mot: 'pomme', icone: '🍎', present: false },
            { petitMot: 'bas', iconePetit: '🧦', mot: 'baleine', icone: '🐳', present: true },
            { petitMot: 'roue', iconePetit: '🛞', mot: 'kangourou', icone: '🦘', present: true },
            { petitMot: 'lit', iconePetit: '🛏️', mot: 'fleur', icone: '🌸', present: false },
            { petitMot: 'lit', iconePetit: '🛏️', mot: 'limace', icone: '🐌', present: true },
            { petitMot: 'roue', iconePetit: '🛞', mot: 'voiture', icone: '🚘', present: false },
            { petitMot: 'boue', iconePetit: '🤎', mot: 'boussole', icone: '🧭', present: true },
            { petitMot: 'boue', iconePetit: '🤎', mot: 'banane', icone: '🍌', present: false }
        ];

        let listeActive = []; let modeJeuActuel = 1; let indexMot = 0; let score = 0;

        function changerEcran(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(id === 'ecran-victoire') { 
                jouerVictoire(); 
                lancerFeuxDartifice(); 
                parler("Mission accomplie ! tu as gagné ton talkie-walkie !");
            }
        }

        function demarrerJeu(mode) {
            modeJeuActuel = mode; indexMot = 0; score = 0;
            if (mode === 1) listeActive = motsJeu1;
            if (mode === 2) listeActive = motsJeu2;
            if (mode === 3) listeActive = motsJeu3;
            
            document.getElementById('titre-mission').innerText = `mission ${mode}`;
            
            // Gestion des interfaces
            document.getElementById('conteneur-clic').style.display = (mode === 1) ? 'flex' : 'none';
            document.getElementById('conteneur-glisser').style.display = (mode === 2) ? 'flex' : 'none';
            document.getElementById('conteneur-talkie').style.display = (mode === 3) ? 'flex' : 'none';
            
            if (mode === 1) document.getElementById('consigne-jeu').innerText = "La syllabe est-elle dans le mot ?";
            if (mode === 2) document.getElementById('consigne-jeu').innerText = "Glisse dans la bonne boîte.";
            if (mode === 3) document.getElementById('consigne-jeu').innerText = "Utilise ton talkie-walkie !";

            mettreAJourInterface(); changerEcran('ecran-jeu'); setTimeout(lireMotActuel, 600);
        }

        function mettreAJourInterface() {
            document.getElementById('score-affichage').innerText = score;
            document.getElementById('barre-progression').style.width = ((indexMot / listeActive.length) * 100) + '%';
            if (indexMot < listeActive.length) {
                // Affiche le GRAND mot au centre
                document.getElementById('mot-visuel').innerText = listeActive[indexMot].icone;
                // Affiche le PETIT mot caché dans le bloc mystère jaune
                document.getElementById('jeu-mystere').innerText = listeActive[indexMot].iconePetit;
            } else { changerEcran('ecran-victoire'); }
        }

        function lireMotActuel() {
            jouerClic(); 
            if(indexMot < listeActive.length) {
                let petit = listeActive[indexMot].petitMot;
                let grand = listeActive[indexMot].mot;
                // Correction vocale avec le mot "syllabe"
                parler("Cherche la syllabe... " + petit + " ... dans le mot ... " + grand);
            }
        }

        function afficherPointFlottant(element) {
            let pts = document.createElement('div'); pts.className = 'point-flottant'; pts.innerText = '+10';
            element.appendChild(pts); setTimeout(() => pts.remove(), 1000);
        }

        function verifierReponse(reponseDonnee, elementCible = null) {
            if(indexMot >= listeActive.length) return;
            
            let estCorrect = (reponseDonnee === listeActive[indexMot].present);
            
            if (estCorrect) {
                jouerSon('succes'); score += 10;
                if(elementCible) afficherPointFlottant(elementCible);
                indexMot++; setTimeout(mettreAJourInterface, 600);
                if(indexMot < listeActive.length) setTimeout(lireMotActuel, 1500);
            } else {
                jouerSon('erreur');
                let el = elementCible || document.getElementById('mot-visuel');
                el.style.animation = 'shake 0.4s'; setTimeout(() => el.style.animation = '', 400);
            }
        }

        // Activité 2 - Glisser fluide
        const dragEl = document.getElementById('mot-visuel');
        dragEl.addEventListener('pointerdown', function(e) {
            if (modeJeuActuel !== 2 || indexMot >= listeActive.length) return;
            dragEl.setPointerCapture(e.pointerId); dragEl.classList.add('dragging'); jouerSon('brique');
            positionnerElement(e); dragEl.addEventListener('pointermove', onMove); dragEl.addEventListener('pointerup', onUp);
        });

        function positionnerElement(e) { dragEl.style.left = e.clientX + 'px'; dragEl.style.top = e.clientY + 'px'; dragEl.style.transform = 'translate(-50%, -50%)'; }
        function onMove(e) { positionnerElement(e); }
        function onUp(e) {
            dragEl.removeEventListener('pointermove', onMove); dragEl.removeEventListener('pointerup', onUp);
            dragEl.releasePointerCapture(e.pointerId); dragEl.classList.remove('dragging');
            dragEl.style.display = 'none'; let elemDessous = document.elementFromPoint(e.clientX, e.clientY); dragEl.style.display = 'block';
            dragEl.style.left = 'auto'; dragEl.style.top = 'auto'; dragEl.style.transform = 'none';
            
            let zoneDepot = elemDessous ? elemDessous.closest('.cible-depot') : null;
            if (zoneDepot) { 
                let reponseGlissee = (zoneDepot.dataset.reponse === 'true');
                verifierReponse(reponseGlissee, zoneDepot); 
            } else { 
                jouerSon('erreur'); 
            }
        }
    </script>
</body>
</html>

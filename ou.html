<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>expert ludicodage : contrôle enseignant</title>
    <style>
        /* contrainte technique : century gothic */
        body {
            font-family: 'Century Gothic', AppleGothic, sans-serif;
            background-color: #2c3e50;
            color: #ecf0f1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            text-align: center;
            overflow-x: hidden;
            text-transform: lowercase; /* tout en minuscule */
        }

        #game-container {
            background-color: #34495e;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            max-width: 800px;
            width: 100%;
            border: 4px solid #f1c40f;
            position: relative;
        }

        /* panneau de navigation discret pour l'enseignante */
        #teacher-controls {
            position: absolute;
            top: 10px;
            left: 10px;
            display: flex;
            gap: 5px;
            opacity: 0.3; /* très discret pour ne pas distraire les élèves */
            transition: opacity 0.3s;
        }
        #teacher-controls:hover { opacity: 1; } /* s'affiche quand tu passes la souris */

        .nav-dot {
            background: #f1c40f;
            color: #2c3e50;
            width: 25px;
            height: 25px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7em;
            cursor: pointer;
            font-weight: bold;
        }

        h1, h2 { color: #f1c40f; }
        h1::first-letter, h2::first-letter, p::first-letter { text-transform: uppercase; }

        .level { display: none; }
        .level.active { 
            display: block; 
            animation: transitionPage 0.6s ease-out; 
        }

        /* transition dynamique de glissement */
        @keyframes transitionPage {
            0% { transform: translateX(50px); opacity: 0; }
            100% { transform: translateX(0); opacity: 1; }
        }

        button {
            background-color: #e74c3c;
            color: white;
            border: none;
            padding: 15px 30px;
            font-family: 'Century Gothic', sans-serif;
            border-radius: 50px;
            cursor: pointer;
            margin: 10px;
            box-shadow: 0 4px 0 #c0392b;
            transition: transform 0.1s;
        }
        button:active { transform: translateY(2px); }
        button::first-letter { text-transform: uppercase; }

        #feedback { margin-top: 20px; font-weight: bold; height: 20px; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="teacher-controls">
        <div class="nav-dot" onclick="showLevel(0)">0</div>
        <div class="nav-dot" onclick="showLevel(1)">1</div>
        <div class="nav-dot" onclick="showLevel(2)">2</div>
        <div class="nav-dot" onclick="showLevel(3)">3</div>
    </div>

    <div id="level-0" class="level active">
        <h1>bienvenue dans la quête !</h1>
        <p>clique sur le bouton pour commencer.</p>
        <button onclick="showLevel(1)">c'est parti !</button>
    </div>

    <div id="level-1" class="level">
        <h2>défi 1 : la forêt des sons</h2>
        <p>trouve le mot caché sous la mousse.</p>
        <button onclick="showLevel(2)">aller au défi 2</button>
    </div>

    <div id="level-2" class="level">
        <h2>défi 2 : le pont de pierre</h2>
        <p>résous l'énigme du troll.</p>
        <button onclick="showLevel(3)">aller au défi 3</button>
    </div>

    <div id="level-3" class="level">
        <h1>victoire finale !</h1>
        <p>tu as réussi ton évasion.</p>
        <button onclick="showLevel(0)">recommencer</button>
    </div>

    <div id="feedback"></div>
</div>

<script>
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    let currentLevel = 0;

    function playSound(freq) {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.3);
    }

    function showLevel(num) {
        if(audioCtx.state === 'suspended') audioCtx.resume();
        
        // cacher tous les niveaux
        document.querySelectorAll('.level').forEach(l => l.classList.remove('active'));
        
        // afficher le bon niveau
        const target = document.getElementById('level-' + num);
        if(target) {
            target.classList.add('active');
            currentLevel = num;
            playSound(400 + (num * 50)); // petit son de transition dynamique
        }
        document.getElementById('feedback').textContent = "";
    }
</script>

</body>
</html>
